name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Typecheck mobile
        run: npm run typecheck:mobile

      - name: Typecheck admin
        run: npm run typecheck:admin

      - name: Build admin
        run: npm --workspace @helihyrox/admin run build
